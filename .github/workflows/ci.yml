name: CI – Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Unit tests & smoke tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install lightweight test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run all tests
        # All tests use only scikit-learn + numpy (no torch/transformers/network).
        # Smoke tests (test_smoke_e2e.py) exercise Exp 0, 1, 5 end-to-end with
        # synthetic data, so no HuggingFace download is needed.
        run: python -m pytest tests/ -v --tb=short
